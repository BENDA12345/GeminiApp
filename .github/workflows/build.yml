name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Generate ic_launcher icons
        run: |
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          
          echo '<?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@mipmap/ic_launcher_background"/><foreground android:drawable="@mipmap/ic_launcher_foreground"/></adaptive-icon>' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          echo '<?xml version="1.0" encoding="utf-8"?><vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108"><path android:fillColor="#008577" android:pathData="M0,0h108v108h-108z"/></vector>' > app/src/main/res/mipmap-anydpi-v26/ic_launcher_background.xml
          echo '<?xml version="1.0" encoding="utf-8"?><vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108"><path android:fillColor="#FFFFFF" android:pathData="M54,54m-20,0a20,20 0,1 1,40 0a20,20 0,1 1,-40 0"/></vector>' > app/src/main/res/mipmap-anydpi-v26/ic_launcher_foreground.xml
          
          # יצירת קבצי תמונה תקניים ושקופים כדי למנוע קריסת קומפילציה
          BASE64_PNG="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII="
          echo $BASE64_PNG | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png
          echo $BASE64_PNG | base64 -d > app/src/main/res/mipmap-mdpi/ic_launcher.png
          echo $BASE64_PNG | base64 -d > app/src/main/res/mipmap-xhdpi/ic_launcher.png
          echo $BASE64_PNG | base64 -d > app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          echo $BASE64_PNG | base64 -d > app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease -Dorg.gradle.jvmargs=-Xmx2048m --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gemini-app
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
